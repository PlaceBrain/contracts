name: Publish Package

on:
  push:
    branches:
      - main
    paths:
      - 'proto/**'
      - 'placebrain_contracts/events/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/publish.yaml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - uses: astral-sh/setup-uv@v3

      - name: Install Python dependencies
        run: uv sync

      - name: Generate protobuf files
        run: uv run python -m grpc_tools.protoc
          --proto_path=proto
          --python_out=./placebrain_contracts
          --grpc_python_out=./placebrain_contracts
          --mypy_out=./placebrain_contracts
          --mypy_grpc_out=./placebrain_contracts
          proto/*.proto

      - name: Fix gRPC imports for package structure
        run: sed -i 's/^import \(.*_pb2\)/from placebrain_contracts import \1/' placebrain_contracts/*_grpc.py

      - name: Build distribution
        run: uv build

      - name: Publish to PyPI
        run: uv publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
