syntax = "proto3";

package collector;

import "google/protobuf/timestamp.proto";

service CollectorService {
  rpc GetLatestReadings(GetLatestReadingsRequest) returns (GetLatestReadingsResponse);
  rpc DeleteReadings(DeleteReadingsRequest) returns (DeleteReadingsResponse);
}

message GetLatestReadingsRequest {
  string device_id = 1;
}

message SensorReading {
  string key = 1;
  double value = 2;
  google.protobuf.Timestamp time = 3;
}

message GetLatestReadingsResponse {
  repeated SensorReading readings = 1;
}

message DeleteReadingsRequest {
  repeated string device_ids = 1;
}

message DeleteReadingsResponse {
  bool success = 1;
}
